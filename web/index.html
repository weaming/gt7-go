<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT7 Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
<div id="header">
  <h1>GT7 Dashboard</h1>
  <div id="status-bar">
    <span class="status-label" data-i18n="status.backend"></span>
    <span id="status-connected" class="status-dot red"></span>
    <span id="status-text" data-i18n="status.disconnected"></span>
    <span class="status-divider"></span>
    <span class="status-label" data-i18n="status.ps5"></span>
    <span id="ps5-status-connected" class="status-dot yellow"></span>
    <span id="ps5-status-text" data-i18n="status.ps5_waiting"></span>
    <span id="lap-info"></span>
  </div>
  <div id="header-actions">
    <div id="lap-data-tools">
      <select id="lap-file-select" title="Lap files"></select>
      <button onclick="loadSelectedLapFile()" data-i18n="misc.load"></button>
      <button onclick="deleteSelectedLapFile()" data-i18n="misc.delete"></button>
      <span class="toolbar-separator"></span>
      <button onclick="saveAllLaps()" data-i18n="misc.save_all"></button>
      <button onclick="clearAllLaps()" data-i18n="misc.clear"></button>
    </div>
    <span id="replay-record-container" style="display:none;font-size:12px;color:#aaa">
      <label style="cursor:pointer">
        <input type="checkbox" id="replay-record-toggle" onchange="toggleReplayRecord(this.checked)">
        <span data-i18n="misc.record_replay"></span>
      </label>
    </span>
    <button id="lang-toggle" onclick="i18n.toggle()"></button>
  </div>
</div>

<div id="tabs">
  <button class="tab-btn active" data-i18n="tab.analysis" data-tab="0"></button>
  <button class="tab-btn" data-i18n="tab.raceline" data-tab="1"></button>
  <button class="tab-btn" data-i18n="tab.race" data-tab="2"></button>
  <button class="tab-btn" data-i18n="tab.corner" data-tab="3"></button>
</div>

<div id="tab-content">
  <div class="tab-pane active" id="tab-0">
    <div id="lap-table" class="lap-table"></div>
    <div id="chart-speed" class="chart"></div>
    <div id="chart-timediff" class="chart"></div>
    <div id="chart-throttle" class="chart"></div>
    <div id="chart-braking" class="chart"></div>
    <div id="chart-coasting" class="chart"></div>
    <div id="chart-yawrate" class="chart"></div>
    <div id="chart-gear" class="chart"></div>
    <div id="chart-rpm" class="chart"></div>
    <div id="chart-boost" class="chart"></div>
    <div id="chart-tires" class="chart"></div>
    <div id="chart-variance" class="chart"></div>
  </div>
  <div class="tab-pane" id="tab-1">
    <div id="lap-table-raceline" class="lap-table"></div>
    <div id="chart-raceline" class="chart full-height"></div>
  </div>
  <div class="tab-pane" id="tab-2">
    <div id="lap-table-race" class="lap-table"></div>
    <div id="chart-fuel" class="chart" style="height:400px"></div>
    <div id="rpm-peaks-table"></div>
  </div>
  <div class="tab-pane" id="tab-3">
    <div id="chart-corner-track" class="chart" style="flex:45"></div>
    <div id="chart-corner" class="chart" style="flex:55"></div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/ws.js"></script>
<script src="js/app.js"></script>
<script src="js/charts/speed.js"></script>
<script src="js/charts/timediff.js"></script>
<script src="js/charts/throttle.js"></script>
<script src="js/charts/braking.js"></script>
<script src="js/charts/coasting.js"></script>
<script src="js/charts/yawrate.js"></script>
<script src="js/charts/gear.js"></script>
<script src="js/charts/rpm.js"></script>
<script src="js/charts/boost.js"></script>
<script src="js/charts/tires.js"></script>
<script src="js/charts/variance.js"></script>
<script src="js/charts/raceline.js"></script>
<script src="js/charts/fuel.js"></script>
<script src="js/charts/corner.js"></script>
</body>
</html>
